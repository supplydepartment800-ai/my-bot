<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI Analyzer v4.6</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            --panel: rgba(255, 255, 255, 0.93);
            --border: rgba(2, 132, 199, 0.12);
            --text: #0f172a;
            --text-sub: #64748b;
            --primary: #0284c7;
            --box-bg: rgba(248, 250, 252, 0.75);
            --green: #10b981;
            --red: #ef4444;
            --toggle-bg: #cbd5e1;
        }
        .dark-theme {
            --bg: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel: rgba(15, 23, 42, 0.9);
            --border: rgba(56, 189, 248, 0.15);
            --text: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #38bdf8;
            --box-bg: rgba(30, 41, 59, 0.7);
            --toggle-bg: #3b82f6;
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .phone-wrapper { width: 100%; max-width: 430px; height: 100vh; max-height: 920px; box-sizing: border-box; padding: 14px; display: flex; flex-direction: column; gap: 10px; position: relative; margin: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; }
        .logo-txt { font-weight: 900; font-size: 19px; color: var(--primary); letter-spacing: 0.5px; }
        .premium-switch { display: flex; align-items: center; gap: 8px; cursor: pointer; background: var(--panel); padding: 4px 10px; border-radius: 30px; border: 1px solid var(--border); }
        .switch-label { font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; }
        .switch-toggle { position: relative; width: 42px; height: 22px; background: var(--toggle-bg); border-radius: 50px; transition: background 0.3s; }
        .switch-toggle::before { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: transform 0.3s; }
        .dark-theme .switch-toggle::before { transform: translateX(20px); }
        .trade-tabs { display: flex; background: rgba(2, 132, 199, 0.06); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-sub); font-weight: 700; font-size: 12px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--panel); color: var(--primary); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.08); }
        .search-box { display: flex; gap: 6px; }
        input { flex: 1; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 14px; font-size: 14px; text-transform: uppercase; outline: none; font-weight: 600; }
        button#analyzeBtn { padding: 12px 22px; background: var(--primary); border: none; color: white; font-weight: 800; border-radius: 14px; cursor: pointer; }
        #chart { height: 32% !important; width: 100%; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
        .panel { background: var(--panel); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 14px; border-radius: 20px; border: 1px solid var(--border); flex: 1; overflow-y: scroll; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
        .panel::-webkit-scrollbar { display: none; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 19px; font-weight: 900; }
        .badge { padding: 5px 14px; border-radius: 30px; font-weight: 800; font-size: 11px; text-transform: uppercase; text-align: center; }
        .BULLISH { background: #e6fbf1; color: #047857; border: 1px solid #a7f3d0; }
        .BEARISH { background: #fff5f5; color: #b91c1c; border: 1px solid #fecaca; }
        .NEUTRAL, .EXHAUSTED { background: var(--box-bg); color: var(--text-sub); border: 1px solid var(--border); }
        .alert-card { background: var(--box-bg); padding: 12px; border-radius: 12px; font-size: 12px; line-height: 1.5; border-left: 4px solid var(--primary); font-weight: 500; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-item { background: var(--box-bg); padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); }
        .lbl { font-size: 9px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; margin-bottom: 3px; }
        .val { font-size: 13px; font-weight: 800; font-family: 'Courier New', monospace; }
        .exchange-row { display: flex; justify-content: space-between; font-size: 12px; padding-bottom: 4px; }
        .fade-in { animation: fadeInEffect 0.3s ease-in forwards; }
        @keyframes fadeInEffect { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="top-bar">
            <div class="logo-txt">NEXUS AI ANALYZER</div>
            <div class="premium-switch" onclick="toggleTheme()">
                <span class="switch-label">Dark Mode</span>
                <div class="switch-toggle"></div>
            </div>
        </div>

        <div class="trade-tabs">
            <button class="tab-btn active" id="tab-future" onclick="switchMode('FUTURE')">FUTURE</button>
            <button class="tab-btn" id="tab-spot" onclick="switchMode('SPOT')">SPOT</button>
        </div>

        <div class="search-box">
            <input type="text" id="coinInput" value="LABUSDT.P">
            <button id="analyzeBtn" onclick="loadCoin()">ANALYZE</button>
        </div>

        <div id="chart"></div>

        <div class="panel" id="signalPanel"></div>
    </div>

    <script>
        let currentCoin = "LABUSDT.P";
        let currentMode = "FUTURE";
        let isDark = false;
        const api_base_url = 'https://worker-production-c4493.up.railway.app/analyze';

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark-theme', isDark);
            loadTradingView(currentCoin);
        }

        function switchMode(mode) {
            if(currentMode === mode) return;
            currentMode = mode;
            document.getElementById('tab-future').classList.toggle('active', mode === 'FUTURE');
            document.getElementById('tab-spot').classList.toggle('active', mode === 'SPOT');
            fetchSignalData();
        }

        function cleanUiInputForTv(coin) {
            let clean = coin.toUpperCase().trim();
            if (clean.includes(":")) clean = clean.split(":")[1];
            if (clean.includes(".")) clean = clean.split(".")[0];
            return "BINANCE:" + clean; 
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            let tvSymbol = cleanUiInputForTv(coin);
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": tvSymbol,
                "interval": "60", "theme": isDark ? "dark" : "light", "style": "1",
                "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function fetchSignalData() {
            try {
                // Backend එකට full string එකම යවනවා, Backend එකෙන් .P සුද්ද කරයි
                const response = await fetch(`${api_base_url}?coin=${currentCoin.toUpperCase().trim()}&mode=${currentMode}`);
                const data = await response.json();

                let badgeClass = data.status || 'NEUTRAL';

                // ⚠️ මෙතන data වල keys සියල්ලම 100% ආරක්ෂිතව Check කරලා පෙන්වනවා
                document.getElementById('signalPanel').innerHTML = `
                    <div class="fade-in" style="display:flex; flex-direction:column; gap:10px;">
                        <div class="header-row">
                            <div>
                                <div class="coin-name">${data.coin || currentCoin} <span style="font-size:11px; color:var(--primary); font-weight:700;">[${data.mode || currentMode}]</span></div>
                                <div style="font-size: 11px; color: var(--text-sub); margin-top: 2px;">Asset Class: <span style="font-weight:700; color:var(--primary);">${data.company_name || 'Crypto Node'}</span></div>
                            </div>
                            <span class="badge ${badgeClass}">${data.signal || 'NO SIGNAL'}</span>
                        </div>

                        <div class="alert-card" style="border-left-color: ${badgeClass==='BULLISH'?'var(--green)':badgeClass==='BEARISH'?'var(--red)':'#64748b'}">
                            <b>ANALYSIS ENGINE:</b> ${data.alert || 'Awaiting signal confluence.'}
                        </div>

                        <div class="grid">
                            <div class="grid-item"><div class="lbl">🎯 Entry Zone</div><div class="val" style="color:var(--primary);">${data.entry_zone || 'No Zone'}</div></div>
                            <div class="grid-item"><div class="lbl">🛡️ Leverage</div><div class="val">${data.leverage || '1x'}</div></div>
                            <div class="grid-item"><div class="lbl">📈 Target 1</div><div class="val" style="color:var(--green);">${data.tp1 || '0.00'}</div></div>
                            <div class="grid-item"><div class="lbl">🛑 Stop Loss</div><div class="val" style="color:var(--red);">${data.sl || '0.00'}</div></div>
                            <div class="grid-item"><div class="lbl">📈 Target 2</div><div class="val" style="color:var(--green);">${data.tp2 || '0.00'}</div></div>
                            <div class="grid-item"><div class="lbl">📊 RSI Matrix</div><div class="val" style="font-size:11px;">${data.rsi || '50.00'}</div></div>
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('signalPanel').innerHTML = `<div style="text-align:center; padding:30px; color:var(--red);">Data sync issue. Retrying...</div>`;
            }
        }

        function loadCoin() {
            let value = document.getElementById('coinInput').value.trim();
            if(!value) return;
            currentCoin = value;
            loadTradingView(currentCoin);
            fetchSignalData();
        }

        // Init
        loadTradingView(currentCoin);
        fetchSignalData();
        setInterval(fetchSignalData, 15000);
    </script>
</body>
</html>
