<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI Premium Terminal v3.5</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f0f7ff 0%, #e0f2fe 100%);
            --panel: rgba(255, 255, 255, 0.9);
            --border: rgba(2, 132, 199, 0.12);
            --text: #0f172a;
            --text-sub: #475569;
            --primary: #0284c7;
            --primary-light: #e0f2fe;
            --box-bg: rgba(255, 255, 255, 0.65);
            --green: #10b981;
            --red: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Strict 9:16 Mobile View Container */
        .phone-wrapper {
            width: 100%; max-width: 420px; height: 100vh;
            max-height: 900px; box-sizing: border-box;
            padding: 12px; display: flex; flex-direction: column; gap: 8px;
            position: relative;
        }

        /* Smooth Splash Screen */
        #splash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease; border-radius: 12px;
        }
        .splash-title {
            font-size: 30px; font-weight: 900; letter-spacing: 5px;
            background: linear-gradient(45deg, #0284c7, #38bdf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Top Logo Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .logo-txt { font-weight: 800; font-size: 18px; color: var(--primary); letter-spacing: 0.5px; }
        .ver-badge { font-size: 10px; background: var(--primary-light); color: var(--primary); padding: 2px 6px; border-radius: 8px; font-weight: bold; }

        /* Spot / Future Mode Selector Tabs */
        .trade-tabs {
            display: flex; background: rgba(2, 132, 199, 0.08); 
            padding: 3px; border-radius: 12px; border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 8px; border: none; background: transparent;
            color: var(--text-sub); font-weight: 700; font-size: 12px;
            border-radius: 9px; cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: #ffffff; color: var(--primary);
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.08);
        }

        /* Search Section */
        .search-box { display: flex; gap: 6px; }
        input {
            flex: 1; padding: 10px 14px; background: var(--panel);
            border: 1px solid var(--border); color: var(--text);
            border-radius: 12px; font-size: 14px; text-transform: uppercase;
            outline: none;
        }
        button#analyzeBtn {
            padding: 10px 18px; background: var(--primary);
            border: none; color: white; font-weight: bold;
            border-radius: 12px; cursor: pointer; font-size: 13px;
        }

        /* Chart Wrapper */
        #chart { 
            height: 30% !important; width: 100%; border-radius: 16px; 
            overflow: hidden; border: 1px solid var(--border);
        }

        /* Main Scrollable Panel */
        .panel {
            background: var(--panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px; border-radius: 16px; border: 1px solid var(--border);
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
            box-shadow: 0 8px 24px rgba(2, 132, 199, 0.03);
        }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 17px; font-weight: 800; }
        .badge { padding: 4px 10px; border-radius: 20px; font-weight: bold; font-size: 11px; }
        
        .BULLISH { background: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .BEARISH { background: #fee2e2; color: #991b1b; border: 1px solid #ef4444; }
        .NEUTRAL, .EXHAUSTED { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; }

        .alert-card {
            background: var(--box-bg); padding: 10px; border-radius: 10px;
            font-size: 11px; line-height: 1.4; border-left: 4px solid var(--primary);
        }

        /* Flexible Information Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .grid-item { background: var(--box-bg); padding: 8px 10px; border-radius: 10px; border: 1px solid var(--border); }
        .lbl { font-size: 9px; color: var(--text-sub); font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .val { font-size: 12px; font-weight: 700; font-family: monospace; }
        
        /* Multi-Exchange Widget */
        .exchange-row { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px dashed var(--border); }
        .exchange-row:last-child { border: none; }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div id="splash"><div class="splash-title">NEXUS AI PRO</div></div>

        <div class="top-bar">
            <div class="logo-txt">NEXUS MULTI-ANALYZER</div>
            <div class="ver-badge">v3.5 PRO</div>
        </div>

        <div class="trade-tabs">
            <button class="tab-btn active" id="tab-future" onclick="switchMode('FUTURE')">FUTURE TRADING</button>
            <button class="tab-btn" id="tab-spot" onclick="switchMode('SPOT')">SPOT TRADING</button>
        </div>

        <div class="search-box">
            <input type="text" id="coinInput" value="BTCUSDT">
            <button id="analyzeBtn" onclick="loadCoin()">ANALYZE</button>
        </div>

        <div id="chart"></div>

        <div class="panel" id="signalPanel">
            <div style="text-align: center; color: var(--text-sub); padding-top: 20px;">Connecting to Nexus Engine...</div>
        </div>
    </div>

    <script>
        let currentCoin = "BTCUSDT";
        let currentMode = "FUTURE";
        const api_base_url = 'https://worker-production-c4493.up.railway.app/analyze';

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if(splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
            }, 1000);
        });

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-future').classList.toggle('active', mode === 'FUTURE');
            document.getElementById('tab-spot').classList.toggle('active', mode === 'SPOT');
            fetchSignalData();
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": "BINANCE:" + coin,
                "interval": "60", "theme": "light", "style": "1",
                "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function fetchSignalData() {
            try {
                const response = await fetch(`${api_base_url}?coin=${currentCoin}&mode=${currentMode}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('signalPanel').innerHTML = `<div style="color:var(--red); font-weight:bold; text-align:center; padding:20px;">Symbol Not Supported.</div>`;
                    return;
                }

                let badgeClass = data.status;

                document.getElementById('signalPanel').innerHTML = `
                    <div class="header-row">
                        <div>
                            <div class="coin-name">${data.coin} <span style="font-size:10px; color:var(--primary);">[${data.mode}]</span></div>
                            <div style="font-size: 11px; color: var(--text-sub); margin-top: 1px;">Live: ${data.price} USDT</div>
                        </div>
                        <span class="badge ${badgeClass}">${data.signal}</span>
                    </div>

                    <div class="alert-card" style="border-left-color: ${badgeClass==='BULLISH'?'var(--green)':badgeClass==='BEARISH'?'var(--red)':'#64748b'}">
                        <b>AI INSIGHT:</b> ${data.alert}
                    </div>

                    <div class="grid">
                        <div class="grid-item"><div class="lbl">🎯 Entry Zone</div><div class="val" style="color:var(--primary);">${data.entry_zone}</div></div>
                        <div class="grid-item"><div class="lbl">🛡️ Leverage</div><div class="val">${data.leverage}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 1 (TP1)</div><div class="val" style="color:var(--green);">${data.tp1}</div></div>
                        <div class="grid-item"><div class="lbl">🛑 Stop Loss (SL)</div><div class="val" style="color:var(--red);">${data.sl}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 2 (TP2)</div><div class="val" style="color:var(--green);">${data.tp2}</div></div>
                        <div class="grid-item"><div class="lbl">📊 RSI (1H)</div><div class="val">${data.rsi}</div></div>
                        <div class="grid-item"><div class="lbl">🧠 Sentiment</div><div class="val" style="color:var(--primary);">${data.market_sentiment}</div></div>
                        <div class="grid-item"><div class="lbl">⚡ Volatility</div><div class="val">${data.volatility}</div></div>
                    </div>

                    <!-- Massive Update: Multi-Exchange Arbitrage/Liquidity Map -->
                    <div class="grid-item" style="margin-top:2px;">
                        <div class="lbl">🌐 Cross-Exchange Liquidity Map (Bybit / OKX Linked)</div>
                        <div class="exchange-row"><span>Binance Live</span><span class="val">${data.exchanges.binance} USDT</span></div>
                        <div class="exchange-row"><span>Bybit Index</span><span class="val">${data.exchanges.bybit} USDT</span></div>
                        <div class="exchange-row"><span>OKX Spot/Fut</span><span class="val">${data.exchanges.okx} USDT</span></div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('signalPanel').innerHTML = `<div style="text-align:center; padding:20px; color:var(--red);">Nexus Core Offline. Syncing...</div>`;
            }
        }

        function loadCoin() {
            let value = document.getElementById('coinInput').value.trim().toUpperCase();
            if(!value) return;
            if(!value.endsWith("USDT") && !value.includes("-")) value += "USDT";
            currentCoin = value;
            loadTradingView(currentCoin);
            fetchSignalData();
        }

        loadTradingView(currentCoin);
        fetchSignalData();
        setInterval(fetchSignalData, 10000); // 10 Sec Background Fast-sync
    </script>
</body>
</html>
