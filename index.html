<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI Analyzer v4.6</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            --panel: rgba(255, 255, 255, 0.95);
            --border: rgba(2, 132, 199, 0.12);
            --text: #0f172a;
            --text-sub: #64748b;
            --primary: #0284c7;
            --box-bg: rgba(248, 250, 252, 0.8);
            --green: #10b981;
            --red: #ef4444;
        }
        .dark-theme {
            --bg: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel: rgba(15, 23, 42, 0.93);
            --border: rgba(56, 189, 248, 0.15);
            --text: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #38bdf8;
            --box-bg: rgba(30, 41, 59, 0.7);
        }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; display: flex; min-height: 100vh; transition: background 0.3s; }
        .phone-wrapper { width: 100%; max-width: 430px; height: 100vh; max-height: 920px; box-sizing: border-box; padding: 14px; display: flex; flex-direction: column; gap: 10px; margin: auto; position: relative; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .logo-txt { font-weight: 900; font-size: 18px; color: var(--primary); letter-spacing: 0.5px; }
        .theme-btn { background: var(--panel); border: 1px solid var(--border); padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--text); }
        .trade-tabs { display: flex; background: rgba(2, 132, 199, 0.06); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-sub); font-weight: 700; font-size: 12px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--panel); color: var(--primary); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.08); }
        .search-box { display: flex; gap: 6px; }
        input { flex: 1; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 14px; font-size: 14px; text-transform: uppercase; outline: none; font-weight: 600; }
        button#analyzeBtn { padding: 12px 22px; background: var(--primary); border: none; color: white; font-weight: 800; border-radius: 14px; cursor: pointer; }
        #chart { height: 32% !important; width: 100%; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
        .panel { background: var(--panel); backdrop-filter: blur(20px); padding: 14px; border-radius: 20px; border: 1px solid var(--border); flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
        .panel::-webkit-scrollbar { display: none; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 18px; font-weight: 900; }
        .badge { padding: 6px 14px; border-radius: 30px; font-weight: 800; font-size: 11px; text-transform: uppercase; }
        .BULLISH { background: #e6fbf1; color: #047857; }
        .BEARISH { background: #fff5f5; color: #b91c1c; }
        .alert-card { background: var(--box-bg); padding: 12px; border-radius: 12px; font-size: 12px; border-left: 4px solid var(--primary); font-weight: 500; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-item { background: var(--box-bg); padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); }
        .lbl { font-size: 9px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; margin-bottom: 3px; }
        .val { font-size: 13px; font-weight: 800; font-family: monospace; }
        
        /* Signals Tab Style */
        .sig-card { background: var(--box-bg); border: 1px solid var(--border); padding: 12px; border-radius: 14px; display: flex; flex-direction: column; gap: 6px; margin-bottom: 4px; }
        .sig-row { display: flex; justify-content: space-between; align-items: center; }
        .sig-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .sig-long { background: rgba(16, 185, 129, 0.15); color: var(--green); }
        .sig-short { background: rgba(239, 68, 68, 0.15); color: var(--red); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="top-bar">
            <div class="logo-txt">NEXUS AI v4.6</div>
            <button class="theme-btn" onclick="toggleTheme()">Theme 🌓</button>
        </div>

        <div class="trade-tabs">
            <button class="tab-btn active" id="tab-future" onclick="switchMode('FUTURE')">FUTURE</button>
            <button class="tab-btn" id="tab-spot" onclick="switchMode('SPOT')">SPOT</button>
            <button class="tab-btn" id="tab-signals" onclick="switchMode('SIGNALS')">⚡ SIGNALS</button>
        </div>

        <div id="searchSection" class="search-box">
            <input type="text" id="coinInput" value="TACUSDT.P">
            <button id="analyzeBtn" onclick="loadCoin()">ANALYZE</button>
        </div>

        <div id="chart"></div>

        <div class="panel" id="mainPanel"></div>
    </div>

    <script>
        let currentCoin = "TACUSDT.P";
        let currentMode = "FUTURE";
        let isDark = false;
        // ඔයාගේ live Railway backend URL එක
        const api_base_url = 'https://worker-production-c4493.up.railway.app';

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('dark-theme', isDark);
            if(currentMode !== 'SIGNALS') loadTradingView(currentCoin);
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-future').classList.toggle('active', mode === 'FUTURE');
            document.getElementById('tab-spot').classList.toggle('active', mode === 'SPOT');
            document.getElementById('tab-signals').classList.toggle('active', mode === 'SIGNALS');

            if(mode === 'SIGNALS') {
                document.getElementById('chart').style.display = 'none';
                document.getElementById('searchSection').style.display = 'none';
                fetchTopSignals();
            } else {
                document.getElementById('chart').style.display = 'block';
                document.getElementById('searchSection').style.display = 'flex';
                loadTradingView(currentCoin);
                fetchAnalysisData();
            }
        }

        function cleanUiInputForTv(coin) {
            let clean = coin.toUpperCase().trim();
            if (clean.includes(":")) clean = clean.split(":")[1];
            if (clean.includes(".")) clean = clean.split(".")[0];
            return "BINANCE:" + clean; 
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": cleanUiInputForTv(coin),
                "interval": "60", "theme": isDark ? "dark" : "light", "style": "1",
                "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function fetchAnalysisData() {
            try {
                document.getElementById('mainPanel').innerHTML = `<div style="color:var(--text-sub); text-align:center; padding:20px;">Analyzing Chart Matrix...</div>`;
                const res = await fetch(`${api_base_url}/analyze?coin=${currentCoin.toUpperCase().trim()}&mode=${currentMode}`);
                const data = await res.json();

                let isBull = data.status === 'BULLISH';
                document.getElementById('mainPanel').innerHTML = `
                    <div class="fade-in" style="display:flex; flex-direction:column; gap:10px;">
                        <div class="header-row">
                            <div>
                                <div class="coin-name">${data.coin}</div>
                                <div style="font-size:11px; color:var(--text-sub); margin-top:2px;">Engine: ${data.company_name}</div>
                            </div>
                            <span class="badge ${isBull?'BULLISH':'BEARISH'}">${data.signal}</span>
                        </div>
                        <div class="alert-card" style="border-left-color: ${isBull?'var(--green)':'var(--red)'}">
                            <b>SIGNAL NOTE:</b> ${data.alert}
                        </div>
                        <div class="grid">
                            <div class="grid-item"><div class="lbl">🎯 Entry Zone</div><div class="val" style="color:var(--primary);">${data.entry_zone}</div></div>
                            <div class="grid-item"><div class="lbl">🛡️ Leverage</div><div class="val">${data.leverage}</div></div>
                            <div class="grid-item"><div class="lbl">📈 Target 1</div><div class="val" style="color:var(--green);">${data.tp1}</div></div>
                            <div class="grid-item"><div class="lbl">🛑 Stop Loss</div><div class="val" style="color:var(--red);">${data.sl}</div></div>
                            <div class="grid-item"><div class="lbl">📈 Target 2</div><div class="val" style="color:var(--green);">${data.tp2}</div></div>
                            <div class="grid-item"><div class="lbl">📊 RSI Matrix</div><div class="val">${data.rsi}</div></div>
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('mainPanel').innerHTML = `<div style="color:var(--red); text-align:center; padding:20px;">Connection failed. Check Backend API.</div>`;
            }
        }

        async function fetchTopSignals() {
            try {
                document.getElementById('mainPanel').innerHTML = `<div style="color:var(--text-sub); text-align:center; padding:20px;">Scanning Future Markets...</div>`;
                const res = await fetch(`${api_base_url}/top-signals`);
                const data = await res.json();

                let htmlContent = `<div class="fade-in" style="display:flex; flex-direction:column; gap:8px;">
                    <div style="font-size:14px; font-weight:800; color:var(--primary); margin-bottom:4px;">🔥 AI RECOMMENDED FUTURE TRADES</div>`;
                
                data.signals.forEach(sig => {
                    let isLong = sig.type.includes("LONG");
                    htmlContent += `
                        <div class="sig-card">
                            <div class="sig-row">
                                <span style="font-weight:900; font-size:15px;">${sig.pair}</span>
                                <span class="sig-badge ${isLong?'sig-long':'sig-short'}">${sig.type}</span>
                            </div>
                            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr; gap:4px; margin-top:4px;">
                                <div><div class="lbl">Entry</div><div class="val" style="font-size:11px;">${sig.entry}</div></div>
                                <div><div class="lbl">Target TP</div><div class="val" style="font-size:11px; color:var(--green);">${sig.tp}</div></div>
                                <div><div class="lbl">Stop Loss</div><div class="val" style="font-size:11px; color:var(--red);">${sig.sl}</div></div>
                            </div>
                        </div>
                    `;
                });
                htmlContent += `</div>`;
                document.getElementById('mainPanel').innerHTML = htmlContent;
            } catch (err) {
                document.getElementById('mainPanel').innerHTML = `<div style="color:var(--red); text-align:center; padding:20px;">Unable to fetch market signals.</div>`;
            }
        }

        function loadCoin() {
            let val = document.getElementById('coinInput').value.trim();
            if(!val) return;
            currentCoin = val;
            loadTradingView(currentCoin);
            fetchAnalysisData();
        }

        // Init
        loadTradingView(currentCoin);
        fetchAnalysisData();
    </script>
</body>
</html>
