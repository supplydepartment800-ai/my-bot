<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Terminal v3.0</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
            --panel: rgba(255, 255, 255, 0.88);
            --border: rgba(14, 165, 233, 0.16);
            --text: #0f172a;
            --text-sub: #475569;
            --primary: #0284c7;
            --box-bg: rgba(241, 245, 249, 0.75);
            --green: #059669;
            --red: #dc2626;
            --shadow: 0 10px 30px rgba(2, 132, 199, 0.05);
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%; max-width: 430px; height: 100vh; max-height: 932px;
            box-sizing: border-box; padding: 12px; display: flex; flex-direction: column; gap: 8px;
            position: relative; overflow: hidden;
        }

        .app-screen { display: flex; flex-direction: column; gap: 8px; height: 100%; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; }
        .logo-txt { font-weight: 900; font-size: 17px; color: var(--primary); }
        .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .search-box { display: flex; gap: 6px; }
        .search-box input {
            width: 100%; padding: 12px 14px; box-sizing: border-box; background: rgba(255,255,255,0.9);
            border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 14px;
            outline: none; font-weight: 600; text-transform: uppercase;
        }
        .scan-btn { width: auto; padding: 0 16px; background: var(--primary); border: none; color: white; font-weight: 900; border-radius: 12px; cursor: pointer; }

        /* Navigation Menu tabs */
        .navigation-tabs { display: flex; background: rgba(2, 132, 199, 0.06); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-sub); font-weight: 800; font-size: 12px; border-radius: 10px; cursor: pointer; text-align: center;}
        .nav-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(2, 132, 199, 0.1); }

        .content-section { display: none; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; scrollbar-width: none; }
        .content-section::-webkit-scrollbar { display: none; }
        .content-section.active { display: flex; }

        #chart { height: 35% !important; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        .panel { background: var(--panel); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.7); display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow); }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 18px; font-weight: 900; }
        .badge { padding: 4px 10px; border-radius: 30px; font-weight: 900; font-size: 9.5px; text-transform: uppercase; }
        .BULLISH { background: rgba(5, 150, 105, 0.1); color: var(--green); border: 1px solid rgba(5,150,105,0.2); }
        .BEARISH { background: rgba(220, 38, 38, 0.1); color: var(--red); border: 1px solid rgba(220,38,38,0.2); }
        .NEUTRAL, .EXHAUSTED { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        
        .alert-card { background: var(--box-bg); padding: 10px; border-radius: 12px; font-size: 11px; line-height: 1.4; border-left: 4px solid var(--primary); font-weight: 700; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .grid-item { background: var(--box-bg); padding: 8px; border-radius: 10px; border: 1px solid var(--border); }
        .lbl { font-size: 9px; color: var(--text-sub); font-weight: 800; text-transform: uppercase; }
        .val { font-size: 12px; font-weight: 800; font-family: monospace; }
        .green-txt { color: var(--green); }

        /* 💬 FULL SIZE AI ASSISTANT CHAT SCREEN GRAPHICS */
        .chat-container { display: flex; flex-direction: column; height: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 22px; overflow: hidden; }
        .chat-header { background: #0f172a; color: white; padding: 12px; font-size: 12.5px; font-weight: 800; text-align: center; }
        .chat-messages { flex: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
        .chat-messages::-webkit-scrollbar { display: none; }
        
        .msg-bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 13px; font-weight: 600; line-height: 1.4; }
        .msg-bubble.user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-bubble.bot { background: #f1f5f9; color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; border-left: 3px solid var(--primary); }
        
        .chat-input-row { display: flex; gap: 6px; padding: 10px; background: white; border-top: 1px solid var(--border); }
        .chat-input-row input { margin: 0; padding: 10px; border-radius: 10px; border: 1px solid var(--border); outline: none; font-weight: 600; width: 100%; }
        .chat-send-btn { width: auto; padding: 10px 16px; font-size: 12px; background: #0f172a; color: white; border: none; font-weight: 800; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone-wrapper">

        <!-- MAIN APPLICATION APP INTERFACE -->
        <div class="app-screen" id="screen-app">
            <div class="top-bar">
                <div class="logo-txt">NEXUS TERMINAL v3.0</div>
                <div><span class="live-dot"></span> <span style="font-size: 11px; font-weight: 800; color:var(--text-sub)">Live Core</span></div>
            </div>

            <!-- Global Search & Execution Controls -->
            <div class="search-box">
                <input type="text" id="coinInput" value="BTCUSDT">
                <button class="scan-btn" onclick="executeScan()">RUN SCAN</button>
            </div>

            <!-- NAVIGATION TAB COMPONENT -->
            <div class="navigation-tabs">
                <button class="nav-btn active" id="btn-future-tab" onclick="switchSection('future')">FUTURE METRICS</button>
                <button class="nav-btn" id="btn-spot-tab" onclick="switchSection('spot')">SPOT ACCUM</button>
                <button class="nav-btn" id="btn-ai-tab" onclick="switchSection('ai')">🤖 NEXUS GEMINI CHAT</button>
            </div>

            <!-- SECTION 1 & 2: TRADING MATRIX PORTAL -->
            <div class="content-section active" id="section-trade">
                <div id="chart"></div>
                <div class="panel" id="signalPanel"></div>
            </div>

            <!-- SECTION 3: FULL SCREEN GEMINI STYLE CHAT MODULE -->
            <div class="content-section" id="section-ai">
                <div class="chat-container">
                    <div class="chat-header" id="chatHeaderTitle">🤖 NEXUS MATRIX CORE AI</div>
                    <div class="chat-messages" id="chatMessagesArea">
                        <div class="msg-bubble bot">ආයුබෝවන්! මම Nexus Gemini AI. මගෙන් ඕනෑම වෙලාවක මේ සක්‍රීය Coin එකේ සජීවී තත්ත්වය සහ Market දිශාව ගැන සිංහලෙන් අහන්න.</div>
                    </div>
                    <div class="chat-input-row">
                        <input type="text" id="chatMsgInput" placeholder="BTC pump weida? / dump weida?">
                        <button class="chat-send-btn" onclick="sendChatMessage()">SEND</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentCoin = "BTCUSDT";
        let currentMode = "FUTURE";
        const api_base_url = 'http://127.0.0.1:8080';

        // Direct System Boot Configuration
        window.onload = function() {
            loadTradingView(currentCoin);
            fetchSignalData();
        };

        // NAVIGATION SWITCH LOGIC LAYER
        function switchSection(target) {
            document.getElementById('btn-future-tab').classList.remove('active');
            document.getElementById('btn-spot-tab').classList.remove('active');
            document.getElementById('btn-ai-tab').classList.remove('active');
            
            document.getElementById('section-trade').classList.remove('active');
            document.getElementById('section-ai').classList.remove('active');

            if(target === 'future') {
                currentMode = "FUTURE";
                document.getElementById('btn-future-tab').classList.add('active');
                document.getElementById('section-trade').classList.add('active');
                fetchSignalData();
            } else if(target === 'spot') {
                currentMode = "SPOT";
                document.getElementById('btn-spot-tab').classList.add('active');
                document.getElementById('section-trade').classList.add('active');
                fetchSignalData();
            } else if(target === 'ai') {
                document.getElementById('btn-ai-tab').classList.add('active');
                document.getElementById('section-ai').classList.add('active');
            }
        }

        // REAL-TIME CHAT PROCESSOR
        async function sendChatMessage() {
            let msgInput = document.getElementById('chatMsgInput');
            let text = msgInput.value.trim();
            if(!text) return;

            msgInput.value = "";
            const msgArea = document.getElementById('chatMessagesArea');
            msgArea.innerHTML += `<div class="msg-bubble user">${text}</div>`;
            msgArea.scrollTop = msgArea.scrollHeight;

            let res = await fetch(`${api_base_url}/ai_chat`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({msg: text, coin: currentCoin})
            });
            let data = await res.json();
            
            msgArea.innerHTML = "";
            data.history.forEach(m => {
                msgArea.innerHTML += `<div class="msg-bubble ${m.sender}">${m.text}</div>`;
            });
            msgArea.scrollTop = msgArea.scrollHeight;
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": "BINANCE:" + coin,
                "interval": "60", "theme": "light", "style": "1", "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function fetchSignalData() {
            try {
                const response = await fetch(`${api_base_url}/analyze?coin=${currentCoin}&mode=${currentMode}`);
                const data = await response.json();

                let badgeClass = data.status;
                let tradePermissionHtml = data.signal.includes("WAIT") 
                    ? `<div style="background:rgba(220,38,38,0.08); border:1px solid var(--red); color:var(--red); text-align:center; padding:6px; border-radius:10px; font-weight:900; font-size:11px;">🚫 RISK STANDBY: ට්‍රේඩ් එකක් ගැනීමෙන් වලකින්න</div>`
                    : `<div style="background:rgba(5,150,105,0.08); border:1px solid var(--green); color:var(--green); text-align:center; padding:6px; border-radius:10px; font-weight:900; font-size:11px;">✅ ACTIVE TRADING MATRIX PERMITTED</div>`;

                document.getElementById('signalPanel').innerHTML = `
                    <div class="header-row">
                        <div><div class="coin-name">${data.coin}</div><div style="font-size: 11px; font-weight:700;">Price: $${data.price}</div></div>
                        <span class="badge ${badgeClass}">${data.signal}</span>
                    </div>
                    ${tradePermissionHtml}
                    <div class="alert-card" style="border-left-color:${badgeClass=='BULLISH'?'var(--green)':'var(--red)'}">${data.alert}</div>
                    <div class="grid">
                        <div class="grid-item"><div class="lbl">🎯 Entry Zone</div><div class="val" style="color:var(--primary);">${data.entry_zone}</div></div>
                        <div class="grid-item"><div class="lbl">🛡️ Leverage Limit</div><div class="val">${data.leverage}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 1</div><div class="val green-txt">$${data.tp1}</div></div>
                        <div class="grid-item"><div class="lbl">🛑 Stop Loss</div><div class="val" style="color:var(--red);">$${data.sl}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 2</div><div class="val green-txt">$${data.tp2}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 3</div><div class="val green-txt">$${data.tp3}</div></div>
                    </div>
                `;
            } catch (e) {}
        }

        function executeScan() {
            let val = document.getElementById('coinInput').value.trim().toUpperCase();
            if(!val) return;
            currentCoin = val.endsWith("USDT") ? val : val + "USDT";
            loadTradingView(currentCoin);
            fetchSignalData();
        }
    </script>
</body>
</html>
