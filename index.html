<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Premium Capital Terminal</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f4faff 0%, #e0f2fe 50%, #bae6fd 100%);
            --panel: rgba(255, 255, 255, 0.86);
            --border: rgba(14, 165, 233, 0.18);
            --text: #0f172a;
            --text-sub: #475569;
            --primary: #0284c7;
            --box-bg: rgba(248, 250, 252, 0.75);
            --green: #059669;
            --red: #dc2626;
            --shadow: 0 10px 35px 0 rgba(2, 132, 199, 0.06);
            --blur: blur(20px);
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        .phone-wrapper {
            width: 100%; max-width: 430px; height: 100vh; max-height: 932px;
            box-sizing: border-box; padding: 14px; display: flex; flex-direction: column; gap: 10px;
            position: relative;
        }

        #splash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.4s ease; border-radius: 24px;
        }
        .splash-loader {
            width: 45px; height: 45px; border: 4px solid #e0f2fe; border-top: 4px solid var(--primary);
            border-radius: 50%; animation: spin 0.9s linear infinite; margin-bottom: 12px;
        }
        .splash-title { font-size: 20px; font-weight: 900; letter-spacing: 1.5px; color: var(--primary); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .logo-txt { font-weight: 900; font-size: 19px; color: var(--primary); letter-spacing: 0.5px; }
        .engine-badge { font-size: 10px; font-weight: 800; background: var(--panel); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-sub); }

        /* Mode Selection Tabs */
        .mode-tabs {
            display: flex; background: rgba(2, 132, 199, 0.08); padding: 4px; border-radius: 16px; border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1; padding: 11px; border: none; background: transparent; color: var(--text-sub);
            font-weight: 800; font-size: 13px; border-radius: 12px; cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn.active {
            background: var(--panel); color: var(--primary); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.12);
        }

        /* Search inputs */
        .search-box { display: flex; gap: 6px; }
        input {
            flex: 1; padding: 13px 16px; background: var(--panel); border: 1px solid var(--border);
            color: var(--text); border-radius: 14px; font-size: 14px; text-transform: uppercase;
            outline: none; font-weight: 700; box-shadow: var(--shadow); transition: all 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        button.action-btn {
            padding: 13px 20px; background: var(--primary); border: none; color: white;
            font-weight: 900; border-radius: 14px; cursor: pointer; font-size: 13px;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2); transition: all 0.2s;
        }
        button.action-btn:active { transform: scale(0.97); }

        #chart { 
            height: 34% !important; width: 100%; border-radius: 18px; 
            overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow);
        }

        .panel {
            background: var(--panel); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 14px; border-radius: 22px; border: 1px solid rgba(255, 255, 255, 0.7);
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 9px;
            box-shadow: var(--shadow); scrollbar-width: none;
        }
        .panel::-webkit-scrollbar { display: none; }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 20px; font-weight: 900; }
        
        .badge { padding: 6px 14px; border-radius: 30px; font-weight: 900; font-size: 10.5px; text-transform: uppercase; text-align: center; }
        .BULLISH { background: rgba(5, 150, 105, 0.12); color: var(--green); border: 1px solid rgba(5, 150, 105, 0.2); }
        .BEARISH { background: rgba(220, 38, 38, 0.12); color: var(--red); border: 1px solid rgba(220, 38, 38, 0.2); }
        .NEUTRAL { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .EXHAUSTED { background: rgba(220, 38, 38, 0.15); color: var(--red); border: 2px dashed var(--red); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .alert-card {
            background: var(--box-bg); padding: 12px; border-radius: 14px;
            font-size: 12px; line-height: 1.45; border-left: 4px solid var(--primary);
            font-weight: 700; color: #334155;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-item { background: var(--box-bg); padding: 11px; border-radius: 12px; border: 1px solid var(--border); }
        .lbl { font-size: 9.5px; color: var(--text-sub); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .val { font-size: 13px; font-weight: 800; font-family: 'SF Mono', monospace; }
        .green-txt { color: var(--green); }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div id="splash">
            <div class="splash-loader"></div>
            <div class="splash-title">NEXUS AI CAPITAL</div>
        </div>

        <div class="top-bar">
            <div class="logo-txt">NEXUS MATRIX</div>
            <div class="engine-badge">PROTECTION v4.0</div>
        </div>

        <!-- Mode Select Layout (Future/Spot Split Options) -->
        <div class="mode-tabs">
            <button class="tab-btn active" id="tab-future" onclick="switchMode('FUTURE')">FUTURE SIGNALS</button>
            <button class="tab-btn" id="tab-spot" onclick="switchMode('SPOT')">SPOT BALANCES</button>
        </div>

        <div class="search-box">
            <input type="text" id="coinInput" value="BTCUSDT" placeholder="ENTER SYMBOL (E.G. ETHUSDT)">
            <button class="action-btn" onclick="executeScan()">AI SCAN</button>
        </div>

        <div id="chart"></div>

        <div class="panel" id="signalPanel">
            <div style="text-align: center; color: var(--text-sub); padding-top: 40px; font-weight: 700;">Awaiting Matrix Input Target...</div>
        </div>
    </div>

    <script>
        let currentCoin = "BTCUSDT";
        let currentMode = "FUTURE";
        // Update to your production API url
        const api_base_url = 'https://worker-production-c4493.up.railway.app/analyze';

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.remove(), 400);
                }
            }, 1000);
        });

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-future').classList.toggle('active', mode === 'FUTURE');
            document.getElementById('tab-spot').classList.toggle('active', mode === 'SPOT');
            fetchSignalData();
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": "BINANCE:" + coin,
                "interval": "60", "theme": "light", "style": "1",
                "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function fetchSignalData() {
            try {
                const response = await fetch(`${api_base_url}?coin=${currentCoin}&mode=${currentMode}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('signalPanel').innerHTML = `<div style="color:var(--red); font-weight:bold; text-align:center; padding:20px;">Unsupported Asset Stream.</div>`;
                    return;
                }

                let badgeClass = data.status;
                let isBull = badgeClass === 'BULLISH';
                let isBear = badgeClass === 'BEARISH';
                let isExhausted = badgeClass === 'EXHAUSTED';
                
                let accentColor = isBull ? 'var(--green)' : (isBear ? 'var(--red)' : (isExhausted ? 'var(--red)' : '#0284c7'));

                // Auto Warning Block logic inside UI rendering
                let tradePermissionHtml = "";
                if (data.signal.includes("DO NOT") || data.signal.includes("WAIT")) {
                    tradePermissionHtml = `<div style="background:rgba(220,38,38,0.1); border:1px solid var(--red); color:var(--red); text-align:center; padding:8px; border-radius:10px; font-weight:900; font-size:12px;">🚫 RISK WARNING: DO NOT ENTER TRADE NOW</div>`;
                } else {
                    tradePermissionHtml = `<div style="background:rgba(5,150,105,0.1); border:1px solid var(--green); color:var(--green); text-align:center; padding:8px; border-radius:10px; font-weight:900; font-size:12px;">✅ AI PERMISSION PASSED: ACTIVE TRADING PERMITTED</div>`;
                }

                document.getElementById('signalPanel').innerHTML = `
                    <div class="header-row fade-in">
                        <div>
                            <div class="coin-name">${data.coin}</div>
                            <div style="font-size: 11.5px; color: var(--text-sub); margin-top: 2px; font-weight: 700;">AI Spot Valuation: <b style="color:var(--text);">$${data.price}</b></div>
                        </div>
                        <span class="badge ${badgeClass}">${data.signal}</span>
                    </div>

                    ${tradePermissionHtml}

                    <div class="alert-card fade-in" style="border-left-color: ${accentColor}; background:rgba(2,132,199,0.02)">
                        <div style="font-size: 9.5px; font-weight: 900; color: var(--text-sub); margin-bottom: 2px;">LOSS PROTECTION INSIGHT:</div>
                        ${data.alert}
                    </div>

                    <div class="grid fade-in">
                        <div class="grid-item"><div class="lbl">🎯 Target Entry</div><div class="val" style="color:var(--primary);">${data.entry_zone}</div></div>
                        <div class="grid-item"><div class="lbl">🛡️ Margin Leverage</div><div class="val">${data.leverage}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Profit Target 1</div><div class="val green-txt">$${data.tp1}</div></div>
                        <div class="grid-item"><div class="lbl">🛑 Protective Stop (SL)</div><div class="val" style="color:var(--red);">$${data.sl}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Profit Target 2</div><div class="val green-txt">$${data.tp2}</div></div>
                        <div class="grid-item"><div class="lbl">📊 RSI Framework</div><div class="val" style="color:#0284c7;">${data.rsi}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Profit Target 3</div><div class="val green-txt">$${data.tp3}</div></div>
                        <div class="grid-item"><div class="lbl">🌐 Macro Pipeline</div><div class="val" style="font-size:11.5px; font-weight:800; color:${isBull?'var(--green)':'var(--text-sub)'}">${data.macro_trend}</div></div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('signalPanel').innerHTML = `<div style="text-align:center; padding:20px; font-weight:700; color:var(--red);">Nexus Server Architecture Syncing...</div>`;
            }
        }

        function executeScan() {
            let value = document.getElementById('coinInput').value.trim().toUpperCase();
            if(!value) return;
            if(!value.endsWith("USDT") && !value.includes("-")) value += "USDT";
            currentCoin = value;
            loadTradingView(currentCoin);
            fetchSignalData();
        }

        // Auto Bootstrapper
        loadTradingView(currentCoin);
        fetchSignalData();
        setInterval(fetchSignalData, 15000);
    </script>
</body>
</html>
