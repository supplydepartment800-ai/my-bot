<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Terminal v3.0</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
            --panel: rgba(255, 255, 255, 0.86);
            --border: rgba(14, 165, 233, 0.18);
            --text: #0f172a;
            --text-sub: #475569;
            --primary: #0284c7;
            --box-bg: rgba(241, 245, 249, 0.75);
            --green: #059669;
            --red: #dc2626;
            --shadow: 0 10px 30px rgba(2, 132, 199, 0.06);
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%; max-width: 430px; height: 100vh; max-height: 932px;
            box-sizing: border-box; padding: 12px; display: flex; flex-direction: column; gap: 8px;
            position: relative; overflow: hidden;
        }

        /* Screens Management */
        .auth-screen { display: flex; flex-direction: column; gap: 12px; justify-content: center; height: 100%; padding: 20px; box-sizing: border-box; }
        .app-screen { display: none; flex-direction: column; gap: 8px; height: 100%; }

        .card { background: var(--panel); backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 20px; border-radius: 24px; box-shadow: var(--shadow); }
        .auth-title { font-size: 22px; font-weight: 900; color: var(--primary); text-align: center; margin-bottom: 4px; }
        
        input {
            width: 100%; padding: 12px 14px; box-sizing: border-box; background: rgba(255,255,255,0.9);
            border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 14px;
            outline: none; font-weight: 600; margin-bottom: 8px;
        }

        button {
            width: 100%; padding: 13px; background: var(--primary); border: none; color: white;
            font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 14px; transition: all 0.2s;
        }
        button:active { transform: scale(0.98); }
        .sec-btn { background: #0f172a; margin-top: 4px; }
        .link-text { text-align: center; font-size: 12px; color: var(--primary); font-weight: 700; cursor: pointer; margin-top: 6px; }

        /* App Navbar & Profile Avatar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; }
        .logo-txt { font-weight: 900; font-size: 17px; color: var(--primary); }
        .profile-container { display: flex; align-items: center; gap: 8px; cursor: pointer; position: relative; }
        .avatar { width: 32px; height: 32px; background: #0284c7; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; box-shadow: 0 0 10px rgba(2,132,199,0.3); }
        
        .profile-dropdown {
            position: absolute; top: 38px; right: 0; background: white; border: 1px solid var(--border);
            padding: 8px; border-radius: 12px; box-shadow: var(--shadow); display: none; z-index: 1000; width: 120px;
        }
        .profile-dropdown div { font-size: 12px; font-weight: 800; padding: 6px; color: var(--red); cursor: pointer; text-align: center; }

        /* Trading & AI UX Layout */
        .ai-chat-box { background: rgba(255, 255, 255, 0.95); border: 1px solid var(--border); border-radius: 16px; padding: 10px; display: flex; flex-direction: column; gap: 6px; }
        .ai-input-row { display: flex; gap: 6px; }
        .ai-input-row input { margin: 0; }
        .ai-btn { width: auto; background: #0f172a; padding: 10px 14px; font-size: 12px; }
        .ai-response { font-size: 12px; color: #1e3a8a; font-weight: 700; background: #eff6ff; padding: 8px; border-radius: 8px; display: none; line-height: 1.4; border-left: 3px solid #3b82f6; }

        .mode-tabs { display: flex; background: rgba(2, 132, 199, 0.06); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 9px; border: none; background: transparent; color: var(--text-sub); font-weight: 800; font-size: 12.5px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(2, 132, 199, 0.1); }

        .search-box { display: flex; gap: 6px; }
        .search-box input { margin: 0; text-transform: uppercase; }
        .scan-btn { width: auto; }

        #chart { height: 28% !important; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        
        .panel { background: var(--panel); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.7); flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow); scrollbar-width: none; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 18px; font-weight: 900; }
        .badge { padding: 4px 10px; border-radius: 30px; font-weight: 900; font-size: 9.5px; text-transform: uppercase; }
        .BULLISH { background: rgba(5, 150, 105, 0.1); color: var(--green); border: 1px solid rgba(5,150,105,0.2); }
        .BEARISH { background: rgba(220, 38, 38, 0.1); color: var(--red); border: 1px solid rgba(220,38,38,0.2); }
        .NEUTRAL, .EXHAUSTED { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        
        .alert-card { background: var(--box-bg); padding: 8px 10px; border-radius: 12px; font-size: 11px; line-height: 1.4; border-left: 4px solid var(--primary); font-weight: 700; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .grid-item { background: var(--box-bg); padding: 8px; border-radius: 10px; border: 1px solid var(--border); }
        .lbl { font-size: 9px; color: var(--text-sub); font-weight: 800; text-transform: uppercase; }
        .val { font-size: 12px; font-weight: 800; font-family: monospace; }
        .green-txt { color: var(--green); }
    </style>
</head>
<body>

    <div class="phone-wrapper">

        <!-- 🏢 SCREEN 1: LOGIN -->
        <div class="auth-screen" id="screen-login">
            <div class="card">
                <div class="auth-title">NEXUS LOGIN</div>
                <input type="email" id="loginEmail" placeholder="Enter Email Address">
                <input type="password" id="loginPass" placeholder="Enter Password">
                <button onclick="handleLogin()">SECURE LOGIN</button>
                <div class="link-text" onclick="showScreen('register')">Create New Premium Account</div>
                <div class="link-text" onclick="showScreen('forget')">Forgot Password?</div>
            </div>
        </div>

        <!-- 🏢 SCREEN 2: REGISTER -->
        <div class="auth-screen" id="screen-register" style="display:none;">
            <div class="card">
                <div class="auth-title">CREATE ACCOUNT</div>
                <input type="text" id="regName" placeholder="Your Full Name">
                <input type="email" id="regEmail" placeholder="Your Valid Email">
                <input type="password" id="regPass" placeholder="Create Secure Password">
                <button onclick="handleRegister()">SEND VERIFICATION OTP</button>
                <div class="link-text" onclick="showScreen('login')">Already have an account? Login</div>
            </div>
        </div>

        <!-- 🏢 SCREEN 3: OTP VERIFY -->
        <div class="auth-screen" id="screen-otp" style="display:none;">
            <div class="card">
                <div class="auth-title">ENTER EMAIL OTP</div>
                <div style="font-size:12px; text-align:center; color:var(--text-sub); margin-bottom:8px;">We sent a 6-digit code to your inbox.</div>
                <input type="text" id="otpInput" placeholder="Enter 6-Digit OTP">
                <button onclick="handleVerifyOtp()">VERIFY & COMPLETE</button>
            </div>
        </div>

        <!-- 🏢 SCREEN 4: FORGET PASSWORD -->
        <div class="auth-screen" id="screen-forget" style="display:none;">
            <div class="card">
                <div class="auth-title">RESET ACCOUNT</div>
                <input type="email" id="forgetEmail" placeholder="Enter Registered Email">
                <button onclick="handleForgetPassword()">SEND RESET OTP</button>
                <div class="link-text" onclick="showScreen('login')">Back to Login</div>
            </div>
        </div>

        <!-- 🏢 SCREEN 5: CREATE NEW PASSWORD -->
        <div class="auth-screen" id="screen-reset-confirm" style="display:none;">
            <div class="card">
                <div class="auth-title">NEW PASSWORD</div>
                <input type="password" id="newPassInput" placeholder="Enter New Secure Password">
                <button onclick="handleResetPasswordConfirm()">CONFIRM NEW PASSWORD</button>
            </div>
        </div>

        <!-- 🖥️ MAIN APPLICATION SCREEN (ANALYZER ENGINE) -->
        <div class="app-screen" id="screen-app">
            <div class="top-bar">
                <div class="logo-txt">NEXUS TERMINAL v3.0</div>
                <!-- Profile Avatar Component -->
                <div class="profile-container" onclick="toggleDropdown()">
                    <div class="avatar" id="userAvatar">U</div>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div onclick="handleLogout()">Logout Account</div>
                    </div>
                </div>
            </div>

            <!-- AI Assistant Dynamic Frame -->
            <div class="ai-chat-box">
                <div style="font-size: 10px; font-weight: 800; color: var(--primary);" id="aiHeaderTitle">🤖 NEXUS AI ADVISOR</div>
                <div class="ai-input-row">
                    <input type="text" id="aiMsgInput" placeholder="Ask AI: Big pump ekak yaida?">
                    <button class="ai-btn" onclick="askAiEngine()">ASK AI</button>
                </div>
                <div class="ai-response" id="aiResponseArea"></div>
            </div>

            <div class="mode-tabs">
                <button class="tab-btn active" id="tab-future" onclick="switchMode('FUTURE')">FUTURE SIGNALS</button>
                <button class="tab-btn" id="tab-spot" onclick="switchMode('SPOT')">SPOT BALANCES</button>
            </div>

            <div class="search-box">
                <input type="text" id="coinInput" value="BTCUSDT">
                <button class="scan-btn" onclick="executeScan()">RUN SCAN</button>
            </div>

            <div id="chart"></div>
            <div class="panel" id="signalPanel"></div>
        </div>

    </div>

    <script>
        let currentCoin = "BTCUSDT";
        let currentMode = "FUTURE";
        let currentUser = null;
        let authSessionEmail = "";
        let authOtpType = "REGISTRATION"; // REGISTRATION or FORGET

        // Local Server Connection Context
        const api_base_url = 'http://127.0.0.1:8080';

        function showScreen(screen) {
            document.querySelectorAll('.auth-screen').forEach(s => s.style.display = 'none');
            document.getElementById('screen-app').style.display = 'none';
            document.getElementById(`screen-${screen}`).style.display = 'flex';
        }

        function toggleDropdown() {
            const drop = document.getElementById('profileDropdown');
            drop.style.display = drop.style.display === 'block' ? 'none' : 'block';
        }

        // AUTHENTICATION LOGIC PIPELINES
        async function handleRegister() {
            let name = document.getElementById('regName').value.trim();
            let email = document.getElementById('regEmail').value.trim();
            let password = document.getElementById('regPass').value;

            if(!name || !email || !password) return alert("All profile parameters required!");

            let res = await fetch(`${api_base_url}/auth/register`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name, email, password})
            });
            let data = await res.json();
            if(data.error) return alert(data.error);

            authSessionEmail = email;
            authOtpType = "REGISTRATION";
            showScreen('otp');
        }

        async function handleVerifyOtp() {
            let otp = document.getElementById('otpInput').value.trim();
            let res = await fetch(`${api_base_url}/auth/verify-otp`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: authSessionEmail, otp})
            });
            let data = await res.json();
            if(data.error) return alert(data.error);

            alert(data.message);
            if(authOtpType === "REGISTRATION") {
                showScreen('login');
            } else {
                showScreen('reset-confirm');
            }
        }

        async function handleForgetPassword() {
            let email = document.getElementById('forgetEmail').value.trim();
            if(!email) return alert("Email address required!");

            let res = await fetch(`${api_base_url}/auth/forget-password`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            let data = await res.json();
            if(data.error) return alert(data.error);

            authSessionEmail = email;
            authOtpType = "FORGET";
            showScreen('otp');
        }

        async function handleResetPasswordConfirm() {
            let password = document.getElementById('newPassInput').value;
            let res = await fetch(`${api_base_url}/auth/reset-password-confirm`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: authSessionEmail, password})
            });
            let data = await res.json();
            if(data.error) return alert(data.error);

            alert(data.message);
            showScreen('login');
        }

        async function handleLogin() {
            let email = document.getElementById('loginEmail').value.trim();
            let password = document.getElementById('loginPass').value;

            let res = await fetch(`${api_base_url}/auth/login`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            });
            let data = await res.json();
            if(data.error) return alert(data.error);

            currentUser = data.user;
            
            // Render Profile UI Avatar and Setup Names dynamically
            document.getElementById('userAvatar').innerText = currentUser.name.charAt(0).toUpperCase();
            document.getElementById('aiHeaderTitle').innerText = `🤖 NEXUS AI ADVISOR (Hi ${currentUser.name}!)`;
            
            document.getElementById('screen-login').style.display = 'none';
            document.getElementById('screen-app').style.display = 'flex';
            
            loadTradingView(currentCoin);
            fetchSignalData();
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('profileDropdown').style.display = 'none';
            showScreen('login');
        }

        // CHAT & CORE PIPELINES
        async function askAiEngine() {
            let msg = document.getElementById('aiMsgInput').value.trim();
            if(!msg) return;
            const area = document.getElementById('aiResponseArea');
            area.style.display = "block"; area.innerText = "විශ්ලේෂණය කරමින් පවතී... ⏳";
            
            let res = await fetch(`${api_base_url}/ai_chat?msg=${encodeURIComponent(msg)}&coin=${currentCoin}&name=${encodeURIComponent(currentUser.name)}`);
            let data = await res.json();
            area.innerText = data.reply;
        }

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-future').classList.toggle('active', mode === 'FUTURE');
            document.getElementById('tab-spot').classList.toggle('active', mode === 'SPOT');
            fetchSignalData();
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": "BINANCE:" + coin,
                "interval": "60", "theme": "light", "style": "1", "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function fetchSignalData() {
            if(!currentUser) return;
            try {
                const response = await fetch(`${api_base_url}/analyze?coin=${currentCoin}&mode=${currentMode}`);
                const data = await response.json();

                let badgeClass = data.status;
                let tradePermissionHtml = data.signal.includes("WAIT") 
                    ? `<div style="background:rgba(220,38,38,0.08); border:1px solid var(--red); color:var(--red); text-align:center; padding:6px; border-radius:10px; font-weight:900; font-size:11px;">🚫 WAIT: දැන් ට්‍රේඩ් කරන්න එපා!</div>`
                    : `<div style="background:rgba(5,150,105,0.08); border:1px solid var(--green); color:var(--green); text-align:center; padding:6px; border-radius:10px; font-weight:900; font-size:11px;">✅ ACTIVE TRADING PERMITTED</div>`;

                document.getElementById('signalPanel').innerHTML = `
                    <div class="header-row">
                        <div><div class="coin-name">${data.coin}</div><div style="font-size: 11px; font-weight:700;">Rate: $${data.price}</div></div>
                        <span class="badge ${badgeClass}">${data.signal}</span>
                    </div>
                    ${tradePermissionHtml}
                    <div class="alert-card" style="border-left-color:${badgeClass==='BULLISH'?'var(--green)':'var(--red)'}">${data.alert}</div>
                    <div class="grid">
                        <div class="grid-item"><div class="lbl">🎯 Entry Zone</div><div class="val" style="color:var(--primary);">${data.entry_zone}</div></div>
                        <div class="grid-item"><div class="lbl">🛡️ Leverage</div><div class="val">${data.leverage}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 1</div><div class="val green-txt">$${data.tp1}</div></div>
                        <div class="grid-item"><div class="lbl">🛑 Stop Loss</div><div class="val" style="color:var(--red);">$${data.sl}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 2</div><div class="val green-txt">$${data.tp2}</div></div>
                        <div class="grid-item"><div class="lbl">📊 RSI</div><div class="val">${data.rsi}</div></div>
                    </div>
                `;
            } catch (e) {}
        }

        function executeScan() {
            let val = document.getElementById('coinInput').value.trim().toUpperCase();
            if(!val) return;
            currentCoin = val.endsWith("USDT") ? val : val + "USDT";
            loadTradingView(currentCoin);
            fetchSignalData();
        }
    </script>
</body>
</html>
