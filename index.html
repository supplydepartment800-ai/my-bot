<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus AI Terminal v4.0 Ultimate</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            --panel: rgba(255, 255, 255, 0.93);
            --border: rgba(2, 132, 199, 0.12);
            --text: #0f172a;
            --text-sub: #64748b;
            --primary: #0284c7;
            --primary-light: #f0f9ff;
            --box-bg: rgba(248, 250, 252, 0.75);
            --green: #10b981;
            --red: #ef4444;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* Strict 9:16 Mobile View Container */
        .phone-wrapper {
            width: 100%; max-width: 420px; height: 100vh; max-height: 900px;
            box-sizing: border-box; padding: 14px; display: flex; flex-direction: column; gap: 10px;
            position: relative;
        }

        /* 🎬 Cinematic Splash Overlay */
        #splash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #ffffff 0%, #f0f9ff 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; border-radius: 12px; transition: all 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .splash-brand { display: flex; flex-direction: column; align-items: center; gap: 5px; animation: initialPop 1.2s forwards; }
        .splash-logo-core { width: 70px; height: 70px; border-radius: 22px; background: linear-gradient(135deg, #0284c7 0%, #38bdf8 100%); box-shadow: 0 15px 35px rgba(2, 132, 199, 0.35); display: flex; align-items: center; justify-content: center; color: #ffffff; font-weight: 900; font-size: 32px; animation: pulseGlow 2s infinite alternate ease-in-out; }
        .splash-title { font-size: 36px; font-weight: 900; letter-spacing: 8px; margin-top: 15px; background: linear-gradient(45deg, #0284c7, #0369a1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .splash-subtitle { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 4px; text-transform: uppercase; margin-top: -5px; }
        .loading-bar-container { width: 140px; height: 4px; background: rgba(2, 132, 199, 0.1); border-radius: 10px; margin-top: 35px; overflow: hidden; position: relative; }
        .loading-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0284c7, #38bdf8); position: absolute; left: -100%; animation: fillProgress 1.6s forwards; }

        @keyframes initialPop { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes pulseGlow { 0% { transform: translateY(0); } 100% { transform: translateY(-4px); } }
        @keyframes fillProgress { 0% { left: -100%; } 100% { left: 0%; } }

        /* Top Layout */
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .logo-txt { font-weight: 900; font-size: 19px; color: var(--primary); letter-spacing: 0.5px; }
        .ver-badge { font-size: 10px; background: #0284c7; color: white; padding: 3px 8px; border-radius: 20px; font-weight: bold; }

        .trade-tabs { display: flex; background: rgba(2, 132, 199, 0.06); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-sub); font-weight: 700; font-size: 12px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: #ffffff; color: var(--primary); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.08); }

        .search-box { display: flex; gap: 6px; }
        input { flex: 1; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); color: var(--text); border-radius: 14px; font-size: 14px; text-transform: uppercase; outline: none; font-weight: 600; }
        button#analyzeBtn { padding: 12px 22px; background: var(--primary); border: none; color: white; font-weight: 800; border-radius: 14px; cursor: pointer; font-size: 13px; }

        #chart { height: 32% !important; width: 100%; border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }

        /* 🚀 SCROLLABLE MAIN PANEL (Hiding Scrollbars Elegantly) */
        .panel {
            background: var(--panel); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 14px; border-radius: 20px; border: 1px solid var(--border);
            flex: 1; overflow-y: scroll; display: flex; flex-direction: column; gap: 10px;
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.03);
            scrollbar-width: none; /* Hide for Firefox */
        }
        .panel::-webkit-scrollbar { display: none; /* Hide for Chrome, Safari, Opera */ }

        .shimmer { background: linear-gradient(90deg, var(--box-bg) 25%, rgba(2, 132, 199, 0.08) 50%, var(--box-bg) 75%); background-size: 200% 100%; animation: loadingGlow 1.4s infinite; }
        @keyframes loadingGlow { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-text { height: 14px; border-radius: 4px; margin-bottom: 5px; }
        .skeleton-btn { height: 35px; border-radius: 10px; }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 19px; font-weight: 900; }
        .badge { padding: 5px 14px; border-radius: 30px; font-weight: 800; font-size: 11px; text-transform: uppercase; }
        
        .BULLISH { background: #e6fbf1; color: #047857; border: 1px solid #a7f3d0; }
        .BEARISH { background: #fff5f5; color: #b91c1c; border: 1px solid #fecaca; }
        .NEUTRAL, .EXHAUSTED { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }

        .alert-card { background: var(--box-bg); padding: 12px; border-radius: 12px; font-size: 12px; line-height: 1.5; border-left: 4px solid var(--primary); font-weight: 500; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-item { background: var(--box-bg); padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); }
        .lbl { font-size: 9px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; margin-bottom: 3px; }
        .val { font-size: 13px; font-weight: 800; font-family: 'Courier New', monospace; }
        
        .exchange-row { display: flex; justify-content: space-between; font-size: 12px; padding-bottom: 4px; border-bottom: 1px dashed rgba(0,0,0,0.05); }
        .exchange-row:last-child { border: none; }
        .fade-in { animation: fadeInEffect 0.3s ease-in forwards; }
        @keyframes fadeInEffect { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div id="splash">
            <div class="splash-brand">
                <div class="splash-logo-core">N</div>
                <div class="splash-title">NEXUS AI</div>
                <div class="splash-subtitle">CONFLUENCE QUANT MATRIX</div>
            </div>
            <div class="loading-bar-container"><div class="loading-bar-fill"></div></div>
        </div>

        <div class="top-bar">
            <div class="logo-txt">NEXUS CORE</div>
            <div class="ver-badge">v4.0 PRO</div>
        </div>

        <div class="trade-tabs">
            <button class="tab-btn active" id="tab-future" onclick="switchMode('FUTURE')">FUTURE</button>
            <button class="tab-btn" id="tab-spot" onclick="switchMode('SPOT')">SPOT</button>
        </div>

        <div class="search-box">
            <input type="text" id="coinInput" value="BTCUSDT">
            <button id="analyzeBtn" onclick="loadCoin()">ANALYZE</button>
        </div>

        <div id="chart"></div>

        <!-- Scrollable Dashboard Panel with Hidden Scrollbars -->
        <div class="panel" id="signalPanel">
            <div class="header-row">
                <div style="width:50%"><div class="skeleton-text shimmer" style="width:80%; height:20px;"></div><div class="skeleton-text shimmer" style="width:50%;"></div></div>
                <div class="skeleton-text shimmer" style="width:70px; height:25px; border-radius:20px;"></div>
            </div>
            <div class="skeleton-btn shimmer" style="height:55px;"></div>
        </div>
    </div>

    <script>
        let currentCoin = "BTCUSDT";
        let currentMode = "FUTURE";
        const api_base_url = 'https://worker-production-c4493.up.railway.app/analyze';

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if(splash) {
                    splash.style.opacity = '0';
                    splash.style.transform = 'scale(1.05)';
                    setTimeout(() => splash.remove(), 600);
                }
            }, 1800);
        });

        function switchMode(mode) {
            if(currentMode === mode) return;
            currentMode = mode;
            document.getElementById('tab-future').classList.toggle('active', mode === 'FUTURE');
            document.getElementById('tab-spot').classList.toggle('active', mode === 'SPOT');
            showSkeleton();
            fetchSignalData();
        }

        function showSkeleton() {
            document.getElementById('signalPanel').innerHTML = `
                <div class="header-row">
                    <div style="width:50%"><div class="skeleton-text shimmer" style="width:80%; height:20px;"></div><div class="skeleton-text shimmer" style="width:50%;"></div></div>
                    <div class="skeleton-text shimmer" style="width:70px; height:25px; border-radius:20px;"></div>
                </div>
                <div class="skeleton-btn shimmer" style="height:55px;"></div>
            `;
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": "BINANCE:" + coin,
                "interval": "60", "theme": "light", "style": "1",
                "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function fetchSignalData() {
            try {
                const response = await fetch(`${api_base_url}?coin=${currentCoin}&mode=${currentMode}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('signalPanel').innerHTML = `<div style="color:var(--red); font-weight:bold; text-align:center; padding:30px;" class="fade-in">Global Search Error: Coin not found.</div>`;
                    return;
                }

                let badgeClass = data.status;

                document.getElementById('signalPanel').innerHTML = `
                    <div class="fade-in" style="display:flex; flex-direction:column; gap:10px;">
                        <div class="header-row">
                            <div>
                                <div class="coin-name">${data.coin} <span style="font-size:11px; color:var(--primary); font-weight:700;">[${data.mode}]</span></div>
                                <div style="font-size: 11px; color: var(--text-sub); margin-top: 2px; font-weight:500;">Aggregated Price: <span style="font-family:monospace; font-weight:700; color:var(--text);">${data.price}</span> USDT</div>
                            </div>
                            <span class="badge ${badgeClass}">${data.signal}</span>
                        </div>

                        <div class="alert-card" style="border-left-color: ${badgeClass==='BULLISH'?'var(--green)':badgeClass==='BEARISH'?'var(--red)':'#64748b'}">
                            <b>AI ANALYSIS:</b> ${data.alert}
                        </div>

                        <div class="grid">
                            <div class="grid-item"><div class="lbl">🎯 Entry Zone</div><div class="val" style="color:var(--primary);">${data.entry_zone}</div></div>
                            <div class="grid-item"><div class="lbl">🛡️ Leverage</div><div class="val">${data.leverage}</div></div>
                            <div class="grid-item"><div class="lbl">📈 Target 1 (TP1)</div><div class="val" style="color:var(--green);">${data.tp1}</div></div>
                            <div class="grid-item"><div class="lbl">🛑 Stop Loss (SL)</div><div class="val" style="color:var(--red);">${data.sl}</div></div>
                            <div class="grid-item"><div class="lbl">📈 Target 2 (TP2)</div><div class="val" style="color:var(--green);">${data.tp2}</div></div>
                            <div class="grid-item"><div class="lbl">📊 Multi-RSI Flow</div><div class="val" style="font-size:11px;">${data.rsi}</div></div>
                            <div class="grid-item"><div class="lbl">🧠 Sentiment</div><div class="val" style="color:var(--primary);">${data.market_sentiment}</div></div>
                            <div class="grid-item"><div class="lbl">⚡ Volatility</div><div class="val">${data.volatility}</div></div>
                        </div>

                        <!-- 🚀 MASSIVE UPDATE: SCROLL DOWN TO VIEW GLOBAL BOTTOM STATISTICS -->
                        <div class="grid-item" style="background:rgba(2, 132, 199, 0.03); border-color:rgba(2, 132, 199, 0.2);">
                            <div class="lbl" style="color:var(--primary); font-weight:800;">📊 Global Volume & Market Analytics</div>
                            <div style="display:flex; flex-direction:column; gap:6px; margin-top:8px;">
                                <div class="exchange-row"><span>24h Total Volume</span><span class="val" style="color:var(--text);">${data.volume_24h}</span></div>
                                <div class="exchange-row"><span>Implied Market Cap</span><span class="val" style="color:var(--text);">${data.market_cap}</span></div>
                                <div class="exchange-row"><span>Net Liquidity Velocity</span><span class="val" style="color:var(--green);">${data.vol_change}</span></div>
                            </div>
                        </div>

                        <div class="grid-item">
                            <div class="lbl" style="margin-bottom:6px;">🌐 Cross-Exchange Liquidity Map</div>
                            <div class="exchange-list">
                                <div class="exchange-row"><span>Binance Live</span><span class="val">${data.exchanges.binance}</span></div>
                                <div class="exchange-row"><span>Bybit Index</span><span class="val">${data.exchanges.bybit}</span></div>
                                <div class="exchange-row"><span>OKX Spot/Fut</span><span class="val">${data.exchanges.okx}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('signalPanel').innerHTML = `<div style="text-align:center; padding:30px; color:var(--red);" class="fade-in">Core Engine Syncing Error. Retrying...</div>`;
            }
        }

        function loadCoin() {
            let value = document.getElementById('coinInput').value.trim().toUpperCase();
            if(!value) return;
            if(!value.endsWith("USDT") && !value.includes("-")) value += "USDT";
            currentCoin = value;
            loadTradingView(currentCoin);
            showSkeleton();
            fetchSignalData();
        }

        loadTradingView(currentCoin);
        fetchSignalData();
        setInterval(fetchSignalData, 12000);
    </script>
</body>
</html>
