<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Terminal v3.0</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
            --panel: rgba(255, 255, 255, 0.84);
            --border: rgba(14, 165, 233, 0.16);
            --text: #0f172a;
            --text-sub: #475569;
            --primary: #0284c7;
            --box-bg: rgba(241, 245, 249, 0.75);
            --green: #059669;
            --red: #dc2626;
            --shadow: 0 10px 30px 0 rgba(2, 132, 199, 0.05);
            --blur: blur(20px);
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        .phone-wrapper {
            width: 100%; max-width: 430px; height: 100vh; max-height: 932px;
            box-sizing: border-box; padding: 12px; display: flex; flex-direction: column; gap: 8px;
            position: relative;
        }

        /* Top Bar Header */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; }
        .logo-txt { font-weight: 900; font-size: 18px; color: var(--primary); letter-spacing: 0.5px; }
        .engine-badge { font-size: 9.5px; font-weight: 800; background: var(--panel); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); color: var(--text-sub); }

        /* Mode Selection System */
        .mode-tabs { display: flex; background: rgba(2, 132, 199, 0.06); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
        .tab-btn {
            flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-sub);
            font-weight: 800; font-size: 12.5px; border-radius: 10px; cursor: pointer; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--panel); color: var(--primary); box-shadow: 0 4px 12px rgba(2, 132, 199, 0.1); }

        /* AI Prompt Chat Row */
        .ai-chat-box {
            background: rgba(255, 255, 255, 0.9); border: 1px solid var(--border);
            border-radius: 16px; padding: 10px; display: flex; flex-direction: column; gap: 6px;
            box-shadow: var(--shadow);
        }
        .ai-input-row { display: flex; gap: 6px; }
        .ai-input-row input {
            flex: 1; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border);
            outline: none; font-size: 13px; font-weight: 600;
        }
        .ai-btn { background: #0f172a; color: white; border: none; padding: 10px 14px; border-radius: 10px; font-weight: 800; font-size: 12px; cursor: pointer; }
        .ai-response { font-size: 12px; color: #1e3a8a; font-weight: 700; background: #eff6ff; padding: 8px; border-radius: 8px; display: none; line-height: 1.4; border-left: 3px solid #3b82f6; }

        /* Main Scan Box */
        .search-box { display: flex; gap: 6px; }
        .search-box input {
            flex: 1; padding: 12px 14px; background: var(--panel); border: 1px solid var(--border);
            color: var(--text); border-radius: 14px; font-size: 14px; text-transform: uppercase;
            outline: none; font-weight: 700; box-shadow: var(--shadow);
        }
        .scan-btn { padding: 12px 18px; background: var(--primary); border: none; color: white; font-weight: 900; border-radius: 14px; cursor: pointer; font-size: 13px; }

        #chart { height: 30% !important; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }

        /* Signal Metrics Board */
        .panel {
            background: var(--panel); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 12px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.7);
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; box-shadow: var(--shadow); scrollbar-width: none;
        }
        .panel::-webkit-scrollbar { display: none; }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 19px; font-weight: 900; }
        
        .badge { padding: 5px 12px; border-radius: 30px; font-weight: 900; font-size: 10px; text-transform: uppercase; text-align: center; }
        .BULLISH { background: rgba(5, 150, 105, 0.1); color: var(--green); border: 1px solid rgba(5, 150, 105, 0.2); }
        .BEARISH { background: rgba(220, 38, 38, 0.1); color: var(--red); border: 1px solid rgba(220, 38, 38, 0.2); }
        .NEUTRAL, .EXHAUSTED { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }

        .alert-card { background: var(--box-bg); padding: 10px; border-radius: 12px; font-size: 11.5px; line-height: 1.4; border-left: 4px solid var(--primary); font-weight: 700; color: #334155; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .grid-item { background: var(--box-bg); padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
        .lbl { font-size: 9px; color: var(--text-sub); font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .val { font-size: 12.5px; font-weight: 800; font-family: monospace; }
        .green-txt { color: var(--green); }

        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="top-bar">
            <div class="logo-txt">NEXUS TERMINAL v3.0</div>
            <div class="engine-badge">10-INDI MATRIX</div>
        </div>

        <!-- 🤖 AI Sinhala Prompt Box (Udinma Added) -->
        <div class="ai-chat-box">
            <div style="font-size: 10.5px; font-weight: 800; color: var(--primary);">🤖 NEXUS AI ADVISOR (සිංහලෙන් විමසන්න)</div>
            <div class="ai-input-row">
                <input type="text" id="aiMsgInput" placeholder="BTC loku pump ekak yaida? / up weida?">
                <button class="ai-btn" onclick="askAiEngine()">ASK AI</button>
            </div>
            <div class="ai-response" id="aiResponseArea"></div>
        </div>

        <div class="mode-tabs">
            <button class="tab-btn active" id="tab-future" onclick="switchMode('FUTURE')">FUTURE SIGNALS</button>
            <button class="tab-btn" id="tab-spot" onclick="switchMode('SPOT')">SPOT BALANCES</button>
        </div>

        <div class="search-box">
            <input type="text" id="coinInput" value="BTCUSDT">
            <button class="scan-btn" onclick="executeScan()">RUN SCAN</button>
        </div>

        <div id="chart"></div>

        <div class="panel" id="signalPanel">
            <div style="text-align: center; color: var(--text-sub); padding-top: 30px; font-weight: 700;">Awaiting Matrix Targets...</div>
        </div>
    </div>

    <script>
        let currentCoin = "BTCUSDT";
        let currentMode = "FUTURE";
        // Change to your production domain
        const api_base_url = 'https://worker-production-c4493.up.railway.app';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-future').classList.toggle('active', mode === 'FUTURE');
            document.getElementById('tab-spot').classList.toggle('active', mode === 'SPOT');
            fetchSignalData();
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": "BINANCE:" + coin,
                "interval": "60", "theme": "light", "style": "1",
                "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function askAiEngine() {
            let msg = document.getElementById('aiMsgInput').value.trim();
            if(!msg) return;
            const area = document.getElementById('aiResponseArea');
            area.style.display = "block";
            area.innerText = "විශ්ලේෂණය කරමින් පවතී... ⏳";
            
            try {
                const response = await fetch(`${api_base_url}/ai_chat?msg=${encodeURIComponent(msg)}&coin=${currentCoin}&mode=${currentMode}`);
                const data = await response.json();
                area.innerText = data.reply;
            } catch(e) {
                area.innerText = "AI සම්බන්ධතාවය බිඳ වැටුණි. කරුණාකර නැවත උත්සාහ කරන්න.";
            }
        }

        async function fetchSignalData() {
            try {
                const response = await fetch(`${api_base_url}/analyze?coin=${currentCoin}&mode=${currentMode}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('signalPanel').innerHTML = `<div style="color:var(--red); font-weight:bold; text-align:center; padding:20px;">Unsupported Asset Stream.</div>`;
                    return;
                }

                let badgeClass = data.status;
                let isBull = badgeClass === 'BULLISH';
                let accentColor = isBull ? 'var(--green)' : (badgeClass === 'BEARISH' ? 'var(--red)' : '#0284c7');

                let tradePermissionHtml = "";
                if (data.signal.includes("DO NOT") || data.signal.includes("WAIT")) {
                    tradePermissionHtml = `<div style="background:rgba(220,38,38,0.08); border:1px solid var(--red); color:var(--red); text-align:center; padding:7px; border-radius:10px; font-weight:900; font-size:11.5px;">🚫 WAIT: දැන් ට්‍රේඩ් කරන්න එපා! (MARKET RISK)</div>`;
                } else {
                    tradePermissionHtml = `<div style="background:rgba(5,150,105,0.08); border:1px solid var(--green); color:var(--green); text-align:center; padding:7px; border-radius:10px; font-weight:900; font-size:11.5px;">✅ PERMISSION PASSED: ACTIVE TRADING PERMITTED</div>`;
                }

                document.getElementById('signalPanel').innerHTML = `
                    <div class="header-row fade-in">
                        <div>
                            <div class="coin-name">${data.coin}</div>
                            <div style="font-size: 11px; color: var(--text-sub); margin-top: 1px; font-weight: 700;">Live Rate: <b style="color:var(--text);">$${data.price}</b></div>
                        </div>
                        <span class="badge ${badgeClass}">${data.signal}</span>
                    </div>

                    ${tradePermissionHtml}

                    <div class="alert-card fade-in" style="border-left-color: ${accentColor};">
                        <div style="font-size: 9px; font-weight: 900; color: var(--text-sub); margin-bottom: 2px;">PROTECTION MATRIX LOGIC:</div>
                        ${data.alert}
                    </div>

                    <div class="grid fade-in">
                        <div class="grid-item"><div class="lbl">🎯 Entry Zone</div><div class="val" style="color:var(--primary);">${data.entry_zone}</div></div>
                        <div class="grid-item"><div class="lbl">🛡️ Leverage Max</div><div class="val">${data.leverage}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 1 (TP1)</div><div class="val green-txt">$${data.tp1}</div></div>
                        <div class="grid-item"><div class="lbl">🛑 Stop Loss (SL)</div><div class="val" style="color:var(--red);">$${data.sl}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 2 (TP2)</div><div class="val green-txt">$${data.tp2}</div></div>
                        <div class="grid-item"><div class="lbl">📊 Confluence Score</div><div class="val" style="font-size:11px; color:#0284c7;">${data.score}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 3 (TP3)</div><div class="val green-txt">$${data.tp3}</div></div>
                        <div class="grid-item"><div class="lbl">🧭 ADX (Trend Power)</div><div class="val">${data.adx}</div></div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('signalPanel').innerHTML = `<div style="text-align:center; padding:20px; font-weight:700; color:var(--red);">Connecting Core Terminal...</div>`;
            }
        }

        function executeScan() {
            let value = document.getElementById('coinInput').value.trim().toUpperCase();
            if(!value) return;
            if(!value.endsWith("USDT") && !value.includes("-")) value += "USDT";
            currentCoin = value;
            loadTradingView(currentCoin);
            fetchSignalData();
        }

        loadTradingView(currentCoin);
        fetchSignalData();
        setInterval(fetchSignalData, 15000);
    </script>
</body>
</html>
