<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Terminal v3.0</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #bae6fd 100%);
            --panel: rgba(255, 255, 255, 0.86);
            --border: rgba(14, 165, 233, 0.18);
            --text: #0f172a;
            --text-sub: #475569;
            --primary: #0284c7;
            --box-bg: rgba(241, 245, 249, 0.75);
            --green: #059669;
            --red: #dc2626;
            --orange: #ea580c;
            --shadow: 0 10px 30px rgba(2, 132, 199, 0.06);
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        .phone-wrapper {
            width: 100%; max-width: 430px; height: 100vh; max-height: 932px;
            box-sizing: border-box; padding: 12px; display: flex; flex-direction: column; gap: 8px;
            position: relative; overflow: hidden;
        }

        .app-screen { display: flex; flex-direction: column; gap: 8px; height: 100%; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; }
        .logo-txt { font-weight: 900; font-size: 17px; color: var(--primary); }
        .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        input {
            width: 100%; padding: 12px 14px; box-sizing: border-box; background: rgba(255,255,255,0.9);
            border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 14px;
            outline: none; font-weight: 600;
        }

        button {
            width: 100%; padding: 13px; background: var(--primary); border: none; color: white;
            font-weight: 900; border-radius: 12px; cursor: pointer; font-size: 14px; transition: all 0.2s;
        }
        button:active { transform: scale(0.98); }

        .mode-tabs { display: flex; background: rgba(2, 132, 199, 0.06); padding: 4px; border-radius: 14px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 9px; border: none; background: transparent; color: var(--text-sub); font-weight: 800; font-size: 12.5px; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(2, 132, 199, 0.1); }

        .search-box { display: flex; gap: 6px; }
        .search-box input { margin: 0; text-transform: uppercase; }
        .scan-btn { width: auto; }

        #chart { height: 34% !important; width: 100%; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
        
        .panel { background: var(--panel); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.7); flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; box-shadow: var(--shadow); scrollbar-width: none; }
        .panel::-webkit-scrollbar { display: none; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 18px; font-weight: 900; }
        .badge { padding: 4px 10px; border-radius: 30px; font-weight: 900; font-size: 9.5px; text-transform: uppercase; }
        
        .BULLISH { background: rgba(5, 150, 105, 0.1); color: var(--green); border: 1px solid rgba(5,150,105,0.2); }
        .BEARISH { background: rgba(220, 38, 38, 0.1); color: var(--red); border: 1px solid rgba(220,38,38,0.2); }
        .NEUTRAL { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
        .EXHAUSTED { background: rgba(234, 88, 12, 0.1); color: var(--orange); border: 1px solid rgba(234,88,12,0.2); }
        
        .strat-card { background: #eff6ff; padding: 10px; border-radius: 14px; font-size: 12px; font-weight: 800; border-left: 4px solid var(--primary); color: #1e40af; line-height: 1.4; }
        .alert-card { background: var(--box-bg); padding: 8px 10px; border-radius: 12px; font-size: 11px; line-height: 1.4; border-left: 4px solid #475569; font-weight: 700; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .grid-item { background: var(--box-bg); padding: 8px; border-radius: 10px; border: 1px solid var(--border); }
        .lbl { font-size: 9px; color: var(--text-sub); font-weight: 800; text-transform: uppercase; }
        .val { font-size: 12px; font-weight: 800; font-family: monospace; }
        .green-txt { color: var(--green); }
        .red-txt { color: var(--red); }
    </style>
</head>
<body>

    <div class="phone-wrapper">

        <div class="app-screen" id="screen-app">
            <div class="top-bar">
                <div class="logo-txt">NEXUS TERMINAL v3.0</div>
                <div><span class="live-dot"></span> <span style="font-size: 11px; font-weight: 800; color:var(--text-sub)">10-Matrix Core</span></div>
            </div>

            <div class="mode-tabs">
                <button class="tab-btn active" id="tab-future" onclick="switchMode('FUTURE')">FUTURE SIGNALS</button>
                <button class="tab-btn" id="tab-spot" onclick="switchMode('SPOT')">SPOT BALANCES</button>
            </div>

            <div class="search-box">
                <input type="text" id="coinInput" value="BTCUSDT">
                <button class="scan-btn" onclick="executeScan()">RUN SCAN</button>
            </div>

            <div id="chart"></div>
            <div class="panel" id="signalPanel"></div>
        </div>

    </div>

    <script>
        let currentCoin = "BTCUSDT";
        let currentMode = "FUTURE";
        const api_base_url = 'http://127.0.0.1:8080';

        window.onload = function() {
            loadTradingView(currentCoin);
            fetchSignalData();
        };

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-future').classList.toggle('active', mode === 'FUTURE');
            document.getElementById('tab-spot').classList.toggle('active', mode === 'SPOT');
            fetchSignalData();
        }

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart", "autosize": true, "symbol": "BINANCE:" + coin,
                "interval": "60", "theme": "light", "style": "1", "hide_side_toolbar": true, "allow_symbol_change": true
            });
        }

        async function fetchSignalData() {
            try {
                const response = await fetch(`${api_base_url}/analyze?coin=${currentCoin}&mode=${currentMode}`);
                const data = await response.json();

                let badgeClass = data.status;
                let stratColor = badgeClass === 'BULLISH' ? 'var(--green)' : (badgeClass === 'BEARISH' ? 'var(--red)' : 'var(--primary)');

                document.getElementById('signalPanel').innerHTML = `
                    <div class="header-row">
                        <div><div class="coin-name">${data.coin}</div><div style="font-size: 11px; font-weight:700;">Price: $${data.price}</div></div>
                        <span class="badge ${badgeClass}">${data.signal}</span>
                    </div>
                    
                    <!-- 📊 LIVE ACTION MANAGEMENT STRATEGY WINDOW -->
                    <div class="strat-card" style="border-left-color:${stratColor}">
                        ${data.strategy}
                    </div>

                    <div class="alert-card">${data.alert}</div>
                    
                    <div class="grid">
                        <div class="grid-item"><div class="lbl">🛡️ Target leverage</div><div class="val">${data.leverage}</div></div>
                        <div class="grid-item"><div class="lbl">📊 Matrix Score</div><div class="val" style="color:${stratColor}">${data.score}</div></div>
                        
                        <div class="grid-item"><div class="lbl">📈 Target 1 (Scalp)</div><div class="val green-txt">$${data.tp1}</div></div>
                        <div class="grid-item"><div class="lbl">🛑 Hard Stop Loss</div><div class="val red-txt">$${data.sl}</div></div>
                        
                        <div class="grid-item"><div class="lbl">📈 Target 2 (Hold)</div><div class="val green-txt">$${data.tp2}</div></div>
                        <div class="grid-item"><div class="lbl">📊 RSI (14h)</div><div class="val">${data.rsi}</div></div>

                        <div class="grid-item"><div class="lbl">📈 Target 3 (Max Swing)</div><div class="val green-txt">$${data.tp3}</div></div>
                        <div class="grid-item"><div class="lbl">⚡ ADX Trend Power</div><div class="val">${data.adx}</div></div>
                    </div>
                `;
            } catch (e) {}
        }

        function executeScan() {
            let val = document.getElementById('coinInput').value.trim().toUpperCase();
            if(!val) return;
            currentCoin = val.endsWith("USDT") ? val : val + "USDT";
            loadTradingView(currentCoin);
            fetchSignalData();
        }
    </script>
</body>
</html>
