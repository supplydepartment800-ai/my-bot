<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Premium Spot Terminal</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root {
            --bg: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 50%, #bae6fd 100%);
            --panel: rgba(255, 255, 255, 0.82);
            --border: rgba(56, 189, 248, 0.22);
            --text: #0f172a;
            --text-sub: #64748b;
            --primary: #0284c7;
            --box-bg: rgba(241, 245, 249, 0.7);
            --shadow: 0 12px 40px 0 rgba(2, 132, 199, 0.08);
            --blue-glow: 0 0 20px rgba(14, 165, 233, 0.2);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* 📱 Strict Phone Aspect Ratio Container */
        .phone-wrapper {
            width: 100%; max-width: 430px; height: 100vh;
            max-height: 932px; box-sizing: border-box;
            padding: 16px; display: flex; flex-direction: column; gap: 12px;
            position: relative;
        }

        /* 🎬 High-End Clean Splash Screen */
        #splash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.5s ease; border-radius: 24px;
        }
        .splash-loader {
            width: 50px; height: 50px;
            border: 4px solid #e0f2fe; border-top: 4px solid var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        .splash-title {
            font-size: 22px; font-weight: 900; letter-spacing: 2px;
            color: var(--primary); font-family: 'Segoe UI', sans-serif;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Navigation Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .logo-txt { font-weight: 900; font-size: 19px; letter-spacing: 0.5px; color: var(--primary); }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }

        /* Search Layout */
        .search-box { display: flex; gap: 8px; }
        input {
            flex: 1; padding: 14px 18px; background: var(--panel);
            border: 1px solid var(--border); color: var(--text);
            border-radius: 16px; font-size: 15px; text-transform: uppercase;
            outline: none; font-weight: 700; box-shadow: var(--shadow);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: all 0.25s;
        }
        input:focus { border-color: var(--primary); box-shadow: var(--blue-glow); }
        
        button {
            padding: 14px 22px; background: var(--primary);
            border: none; color: white; font-weight: 900;
            border-radius: 16px; cursor: pointer; font-size: 14px;
            box-shadow: 0 4px 14px rgba(2, 132, 199, 0.25);
            transition: all 0.2s;
        }
        button:active { transform: scale(0.96); }

        /* Interactive Live Chart Wrapper */
        #chart { 
            height: 35% !important; width: 100%; border-radius: 20px; 
            overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow);
        }

        /* Glassmorphic Analytics Main Panel */
        .panel {
            background: var(--panel); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 16px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.7);
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
            box-shadow: var(--shadow); scrollbar-width: none;
        }
        .panel::-webkit-scrollbar { display: none; }

        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .coin-name { font-size: 21px; font-weight: 900; letter-spacing: -0.5px; }
        
        /* Premium Condition Badges */
        .badge { padding: 7px 14px; border-radius: 30px; font-weight: 900; font-size: 11px; letter-spacing: 0.3px; }
        .BULLISH { background: #e6fbf2; color: #047857; border: 1px solid #a7f3d0; }
        .BEARISH { background: #fff5f5; color: #b91c1c; border: 1px solid #fecaca; }
        .NEUTRAL, .EXHAUSTED { background: #f0fdfa; color: #0369a1; border: 1px solid #bae6fd; }

        .alert-card {
            background: var(--box-bg); padding: 12px 14px; border-radius: 16px;
            font-size: 12.5px; line-height: 1.5; border-left: 4px solid var(--primary);
            font-weight: 600; color: #334155;
        }

        /* Structured Metric Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-item { background: var(--box-bg); padding: 12px; border-radius: 14px; border: 1px solid var(--border); }
        .lbl { font-size: 10px; color: var(--text-sub); font-weight: 800; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 0.3px; }
        .val { font-size: 13.5px; font-weight: 800; font-family: 'SF Mono', monospace; }
        .green-txt { color: #059669; }

        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <!-- Loader Screen -->
        <div id="splash">
            <div class="splash-loader"></div>
            <div class="splash-title">NEXUS SPOT AI</div>
        </div>

        <div class="top-bar">
            <div class="logo-txt">NEXUS SPOT v3.0</div>
            <div style="display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 800; color: var(--text-sub);">
                <div class="status-dot"></div> ENGINE LIVE
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="coinInput" value="BTCUSDT" placeholder="ENTER SYMBOL">
            <button onclick="loadCoin()">RUN SCAN</button>
        </div>

        <div id="chart"></div>

        <div class="panel" id="signalPanel">
            <div style="text-align: center; color: var(--text-sub); padding-top: 40px; font-weight: 700;">Initializing Spot Scanning Array...</div>
        </div>
    </div>

    <script>
        let currentCoin = "BTCUSDT";
        // Change this URL to your live backend domain (e.g. Railway or Render URL)
        const api_base_url = 'https://worker-production-c4493.up.railway.app/analyze';

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if(splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => splash.remove(), 500);
                }
            }, 1200);
        });

        function loadTradingView(coin) {
            document.getElementById('chart').innerHTML = ""; 
            new TradingView.widget({
                "container_id": "chart",
                "autosize": true,
                "symbol": "BINANCE:" + coin,
                "interval": "60",
                "theme": "light",
                "style": "1",
                "hide_side_toolbar": true,
                "allow_symbol_change": true
            });
        }

        async function fetchSignalData() {
            try {
                const response = await fetch(`${api_base_url}?coin=${currentCoin}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('signalPanel').innerHTML = `<div style="color:#dc2626; font-weight:bold; text-align:center; padding:20px;">Unsupported Asset Symbol.</div>`;
                    return;
                }

                let badgeClass = data.status;
                let isBull = badgeClass === 'BULLISH';
                let isBear = badgeClass === 'BEARISH';
                
                let accentColor = isBull ? '#059669' : (isBear ? '#dc2626' : '#0284c7');

                document.getElementById('signalPanel').innerHTML = `
                    <div class="header-row fade-in">
                        <div>
                            <div class="coin-name">${data.coin}</div>
                            <div style="font-size: 11.5px; color: var(--text-sub); margin-top: 2px; font-weight: 700;">Market Value: <b style="color:var(--text);">$${data.price}</b></div>
                        </div>
                        <span class="badge ${badgeClass}">${data.signal}</span>
                    </div>

                    <div class="alert-card fade-in" style="border-left-color: ${accentColor};">
                        <div style="font-size: 10px; font-weight: 900; color: var(--text-sub); margin-bottom: 2px;">SPOT MARKET LOGIC ARRAY:</div>
                        ${data.alert}
                    </div>

                    <div class="grid fade-in">
                        <div class="grid-item"><div class="lbl">🎯 Entry Zone</div><div class="val" style="color:var(--primary);">${data.entry_zone}</div></div>
                        <div class="grid-item"><div class="lbl">🛡️ Leverage Limit</div><div class="val">${data.leverage}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 1 (TP1)</div><div class="val green-txt">$${data.tp1}</div></div>
                        <div class="grid-item"><div class="lbl">🛑 Capital Protection (SL)</div><div class="val" style="color:#dc2626;">$${data.sl}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 2 (TP2)</div><div class="val green-txt">$${data.tp2}</div></div>
                        <div class="grid-item"><div class="lbl">📊 RSI (1H Trend)</div><div class="val" style="color:#0284c7;">${data.rsi}</div></div>
                        <div class="grid-item"><div class="lbl">📈 Target 3 (TP3)</div><div class="val green-txt">$${data.tp3}</div></div>
                        <div class="grid-item"><div class="lbl">🌐 Macro Structure</div><div class="val" style="font-size:11.5px; color:${isBull?'#059669':'#64748b'};">${data.macro_trend}</div></div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('signalPanel').innerHTML = `<div style="text-align:center; padding:20px; font-weight:700; color:#dc2626;">Connecting to Core Spot Pipeline...</div>`;
            }
        }

        function loadCoin() {
            let value = document.getElementById('coinInput').value.trim().toUpperCase();
            if(!value) return;
            if(!value.endsWith("USDT") && !value.includes("-")) value += "USDT";
            currentCoin = value;
            loadTradingView(currentCoin);
            fetchSignalData();
        }

        // Initialization
        loadTradingView(currentCoin);
        fetchSignalData();
        setInterval(fetchSignalData, 15000); // 15s refresh interval
    </script>
</body>
</html>
